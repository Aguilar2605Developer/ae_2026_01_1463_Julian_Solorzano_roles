spring:
  application:
    name: exam2
  datasource:
    url: jdbc:postgresql://localhost:5432/estacionamiento_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_yzwNALI2A

server:
  port: 8080

logging:
  level:
    com.pucetec.exam2: DEBUG